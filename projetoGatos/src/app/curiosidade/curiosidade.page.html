<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Curiosidade Felina</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="fundo-gato-container">
    
    <ion-card class="card-curiosidade">
      <ion-card-header class="ion-text-center">
        <ion-card-title class="titulo-card">🐾 Você Sabia? 🐾</ion-card-title>
      </ion-card-header>
      
      <ion-card-content class="ion-text-center texto-fato">
        "{{ fatoDoGato }}"
      </ion-card-content>

      <div class="ion-padding ion-text-center">
        <ion-button expand="block" shape="round" color="primary" (click)="buscarNovoFato()">
          <ion-icon slot="start" name="refresh-outline"></ion-icon>
          Novo Fato
        </ion-button>
        
        <ion-button fill="clear" color="medium" routerLink="/home" class="ion-margin-top">
          Voltar
        </ion-button>
      </div>
    </ion-card>

  </div>
</ion-content>
