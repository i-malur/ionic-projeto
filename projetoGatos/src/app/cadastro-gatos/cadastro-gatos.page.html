<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Cadastro de novos gatos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">cadastroGatos</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-item>
    <ion-input
      placeholder="Nome do gato"
      [(ngModel)]="nome">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-textarea
      placeholder="Descrição"
      [(ngModel)]="descricao">
    </ion-textarea>
  </ion-item>

  <ion-item>
    <ion-input placeholder="URL da foto" [(ngModel)]="urlFoto">
    </ion-input>
  </ion-item>

  <ion-button expand="block" color="secondary" (click)="salvarGato()">
    Cadastrar gato
  </ion-button>

  <ion-button routerLink="/cards-page" color="primary" class="button-card">
     Ver gatos cadastrados
  </ion-button>

  <ion-button routerLink="/home" color="primary" class="button-useless">
      Voltar
  </ion-button>
</ion-content>
